<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Manager Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.12);
  --cyan-border: rgba(0,212,255,0.25);
  --purple: #7c3aed;
  --orange: #ff6b35;
  --bg: #060810;
  --bg2: #0d1117;
  --bg3: #111827;
  --card: #0f1520;
  --card2: #141d2b;
  --text: #e8eaf0;
  --muted: #6b7280;
  --muted2: #9ca3af;
  --border: rgba(255,255,255,0.06);
  --sidebar-w: 260px;
  --header-h: 64px;
  --glow: 0 0 24px rgba(0,212,255,0.18);
  --locked-blur: blur(6px);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── GRID NOISE BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(ellipse 80% 60% at 10% -10%, rgba(0,212,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124,58,237,0.06) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── LOGIN SCREEN ── */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  width:420px;
  background:var(--card);
  border:1px solid var(--cyan-border);
  border-radius:16px;
  padding:40px;
  box-shadow:var(--glow);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
}
.login-logo{
  display:flex;align-items:center;gap:12px;margin-bottom:32px;
}
.login-logo .icon{
  width:44px;height:44px;border-radius:10px;
  background:var(--cyan-dim);border:1px solid var(--cyan-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);font-size:1.2rem;
}
.login-logo h1{font-family:'Orbitron',monospace;font-size:1rem;color:var(--cyan);letter-spacing:2px;}
.login-logo p{font-size:0.75rem;color:var(--muted);margin-top:2px;}
.login-box h2{font-family:'Orbitron',monospace;font-size:1.1rem;margin-bottom:6px;color:var(--text);}
.login-box > p{font-size:0.9rem;color:var(--muted);margin-bottom:28px;}

.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:0.85rem;font-weight:600;color:var(--muted2);margin-bottom:8px;letter-spacing:0.5px;}
.form-group select,
.form-group input{
  width:100%;padding:12px 14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:0.95rem;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;
}
.form-group select:focus,
.form-group input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,212,255,0.1);
}
.form-group select option{background:var(--bg3);}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  border:none;border-radius:8px;
  color:#fff;font-family:'Orbitron',monospace;
  font-size:0.85rem;font-weight:600;letter-spacing:1.5px;
  cursor:pointer;transition:opacity 0.2s,transform 0.2s;
  margin-top:8px;
}
.btn-login:hover{opacity:0.9;transform:translateY(-1px);}
.login-hint{font-size:0.78rem;color:var(--muted);text-align:center;margin-top:16px;}
.login-error{
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
  border-radius:8px;padding:10px 14px;font-size:0.85rem;color:#f87171;
  margin-bottom:16px;display:none;
}

/* ── LAYOUT ── */
#app{display:none;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:100;
  transition:transform 0.3s ease;
}
.sidebar-brand{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.brand-icon{
  width:38px;height:38px;border-radius:9px;
  background:var(--cyan-dim);border:1px solid var(--cyan-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--cyan);font-size:1rem;flex-shrink:0;
}
.brand-text h1{font-family:'Orbitron',monospace;font-size:0.72rem;color:var(--cyan);letter-spacing:2px;}
.brand-text p{font-size:0.7rem;color:var(--muted);margin-top:2px;}

.sidebar-user{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:700;
  color:#fff;flex-shrink:0;
  border:2px solid var(--cyan-border);
}
.user-meta{overflow:hidden;}
.user-meta .uname{font-size:0.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-meta .urole{font-size:0.7rem;color:var(--cyan);font-weight:500;letter-spacing:0.5px;}

.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0;}
.sidebar-nav::-webkit-scrollbar{width:4px;}
.sidebar-nav::-webkit-scrollbar-track{background:transparent;}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.nav-section-label{
  padding:14px 20px 6px;
  font-size:0.65rem;font-weight:700;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
}

.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 20px;
  cursor:pointer;
  transition:background 0.15s,border-left-color 0.15s;
  border-left:3px solid transparent;
  position:relative;
  text-decoration:none;
}
.nav-item:hover:not(.locked){background:rgba(255,255,255,0.04);}
.nav-item.active{
  background:var(--cyan-dim);
  border-left-color:var(--cyan);
}
.nav-item i.icon{
  width:20px;text-align:center;
  font-size:0.9rem;color:var(--muted);
  transition:color 0.15s;flex-shrink:0;
}
.nav-item.active i.icon{color:var(--cyan);}
.nav-item:hover:not(.locked) i.icon{color:var(--muted2);}
.nav-item span.label{font-size:0.875rem;font-weight:500;color:var(--muted2);flex:1;}
.nav-item.active span.label{color:var(--text);font-weight:600;}

/* LOCKED nav item */
.nav-item.locked{
  cursor:not-allowed;
  opacity:0.45;
}
.nav-item.locked .lock-icon{
  font-size:0.7rem;color:var(--muted);
}
.nav-item.locked:hover{background:transparent;}

.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--border);
}
.logout-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:8px;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2);
  color:#f87171;font-size:0.85rem;font-weight:600;
  cursor:pointer;transition:background 0.2s;width:100%;
}
.logout-btn:hover{background:rgba(239,68,68,0.14);}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:var(--sidebar-w);right:0;
  height:var(--header-h);
  background:rgba(6,8,16,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:90;
}
.header-left{display:flex;align-items:center;gap:16px;}
.page-title{font-family:'Orbitron',monospace;font-size:0.85rem;color:var(--text);letter-spacing:1px;}
.breadcrumb{font-size:0.78rem;color:var(--muted);}
.mobile-toggle{
  display:none;background:none;border:none;
  color:var(--muted2);font-size:1.1rem;cursor:pointer;
}
.header-right{display:flex;align-items:center;gap:16px;}

.notif-btn{
  position:relative;background:none;border:none;
  color:var(--muted2);font-size:1rem;cursor:pointer;
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,color 0.2s;
}
.notif-btn:hover{background:var(--cyan-dim);color:var(--cyan);}
.notif-dot{
  position:absolute;top:6px;right:6px;
  width:8px;height:8px;border-radius:50%;
  background:#ef4444;border:2px solid var(--bg);
}
.header-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:0.65rem;font-weight:700;
  color:#fff;border:2px solid var(--cyan-border);cursor:pointer;
}
.role-badge{
  padding:4px 10px;border-radius:20px;
  background:var(--cyan-dim);border:1px solid var(--cyan-border);
  font-size:0.7rem;font-weight:700;color:var(--cyan);
  letter-spacing:0.5px;white-space:nowrap;
}

/* ── MAIN ── */
.main{
  margin-left:var(--sidebar-w);
  margin-top:var(--header-h);
  padding:28px;
  min-height:calc(100vh - var(--header-h));
  position:relative;z-index:1;
}

/* ── LOCKED SECTION OVERLAY ── */
.section-locked{
  position:relative;min-height:400px;
  display:flex;align-items:center;justify-content:center;
}
.locked-blur-layer{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 30px,
    rgba(255,255,255,0.015) 30px,rgba(255,255,255,0.015) 31px
  );
  filter:var(--locked-blur);
  pointer-events:none;
}
.locked-overlay-content{
  position:relative;z-index:2;
  text-align:center;padding:40px;
}
.lock-shield{
  width:80px;height:80px;border-radius:50%;
  background:rgba(239,68,68,0.1);
  border:2px solid rgba(239,68,68,0.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:2rem;color:#ef4444;
  animation:lockPulse 2.5s ease-in-out infinite;
}
@keyframes lockPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3);}
  50%{box-shadow:0 0 0 16px rgba(239,68,68,0);}
}
.locked-overlay-content h3{
  font-family:'Orbitron',monospace;font-size:1rem;
  color:#f87171;margin-bottom:8px;letter-spacing:1px;
}
.locked-overlay-content p{font-size:0.9rem;color:var(--muted);max-width:320px;margin:0 auto 20px;}
.locked-overlay-content .access-role{
  display:inline-block;padding:6px 16px;
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  border-radius:20px;font-size:0.75rem;color:#f87171;font-weight:600;letter-spacing:0.5px;
}

/* ── CONTENT SECTIONS ── */
.section{display:none;}
.section.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.section-header{margin-bottom:28px;}
.section-header h2{
  font-family:'Orbitron',monospace;font-size:1.1rem;
  color:var(--text);letter-spacing:1px;margin-bottom:4px;
}
.section-header p{font-size:0.875rem;color:var(--muted);}

/* ── STAT CARDS ── */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(min(200px,100%),1fr));
  gap:16px;margin-bottom:28px;
}
.stat-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;padding:20px;
  position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s;
  cursor:default;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.stat-card.c1::before{background:linear-gradient(90deg,var(--cyan),transparent);}
.stat-card.c2::before{background:linear-gradient(90deg,var(--purple),transparent);}
.stat-card.c3::before{background:linear-gradient(90deg,var(--orange),transparent);}
.stat-card.c4::before{background:linear-gradient(90deg,#10b981,transparent);}
.stat-card.c5::before{background:linear-gradient(90deg,#f59e0b,transparent);}
.stat-card.c6::before{background:linear-gradient(90deg,#ec4899,transparent);}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.stat-label{font-size:0.78rem;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.stat-icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;
}
.stat-card.c1 .stat-icon{background:rgba(0,212,255,0.1);color:var(--cyan);}
.stat-card.c2 .stat-icon{background:rgba(124,58,237,0.1);color:#a78bfa;}
.stat-card.c3 .stat-icon{background:rgba(255,107,53,0.1);color:var(--orange);}
.stat-card.c4 .stat-icon{background:rgba(16,185,129,0.1);color:#10b981;}
.stat-card.c5 .stat-icon{background:rgba(245,158,11,0.1);color:#f59e0b;}
.stat-card.c6 .stat-icon{background:rgba(236,72,153,0.1);color:#ec4899;}
.stat-value{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.stat-sub{font-size:0.8rem;color:var(--muted);}
.stat-change{font-size:0.78rem;margin-top:8px;display:flex;align-items:center;gap:4px;}
.stat-change.up{color:#10b981;}.stat-change.down{color:#ef4444;}

/* ── TABLE ── */
.table-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.table-header{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.table-header h3{font-size:0.9rem;font-weight:700;color:var(--text);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{
  padding:12px 16px;text-align:left;
  font-size:0.72rem;font-weight:700;letter-spacing:1px;
  color:var(--muted);text-transform:uppercase;
  background:var(--bg3);border-bottom:1px solid var(--border);
}
td{
  padding:13px 16px;font-size:0.875rem;
  border-bottom:1px solid rgba(255,255,255,0.03);
  color:var(--muted2);
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.3px;
}
.badge-active{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.2);}
.badge-pending{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.2);}
.badge-leave{background:rgba(124,58,237,0.12);color:#a78bfa;border:1px solid rgba(124,58,237,0.2);}
.badge-critical{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
.badge-info{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid var(--cyan-border);}

/* ── BUTTONS ── */
.btn{
  padding:9px 18px;border-radius:8px;border:none;
  font-family:'Rajdhani',sans-serif;font-size:0.875rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:7px;
}
.btn-primary{background:var(--cyan);color:#000;}
.btn-primary:hover{background:#00bfdf;}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted2);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text);}
.btn-danger{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.btn-approve{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.2);}
.btn-approve:hover{background:rgba(16,185,129,0.2);}

/* ── ACTIVITIES ── */
.activity-list{padding:0 20px 20px;}
.activity-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.03);
}
.activity-item:last-child{border-bottom:none;}
.activity-dot{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;flex-shrink:0;margin-top:2px;
}
.dot-green{background:rgba(16,185,129,0.12);color:#10b981;}
.dot-cyan{background:rgba(0,212,255,0.1);color:var(--cyan);}
.dot-orange{background:rgba(255,107,53,0.1);color:var(--orange);}
.dot-red{background:rgba(239,68,68,0.1);color:#f87171;}
.activity-msg{font-size:0.875rem;color:var(--muted2);line-height:1.5;}
.activity-time{font-size:0.75rem;color:var(--muted);margin-top:3px;}

/* ── PROFILE ── */
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;}
.profile-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:28px;text-align:center;
}
.profile-avatar-lg{
  width:100px;height:100px;border-radius:50%;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:#fff;
  border:3px solid var(--cyan-border);box-shadow:var(--glow);
}
.profile-name{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.profile-role{font-size:0.8rem;color:var(--cyan);font-weight:600;letter-spacing:0.5px;margin-bottom:20px;}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.profile-stat{
  background:var(--bg3);border-radius:8px;padding:12px;
  text-align:center;border:1px solid var(--border);
}
.profile-stat .val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--cyan);}
.profile-stat .lbl{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.info-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;
}
.info-card h3{font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:20px;
  padding-bottom:12px;border-bottom:1px solid var(--border);}
.info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.info-row:last-child{border-bottom:none;}
.info-row label{font-size:0.78rem;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;width:140px;flex-shrink:0;}
.info-row span{font-size:0.9rem;color:var(--muted2);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);z-index:500;
  display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--cyan-border);
  border-radius:16px;padding:28px;width:100%;max-width:520px;
  position:relative;box-shadow:var(--glow);
  animation:fadeUp 0.25s ease;
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-family:'Orbitron',monospace;font-size:0.9rem;color:var(--text);margin-bottom:20px;letter-spacing:1px;}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,0.05);border:none;
  color:var(--muted);width:28px;height:28px;border-radius:6px;
  cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;

.modal .form-group{margin-bottom:16px;}

.modal .form-group input,
.modal .form-group select,
.modal .form-group textarea{
  width:100%;padding:11px 14px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:0.9rem;
  outline:none;transition:border-color 0.2s;
}
.modal .form-group input:focus,
.modal .form-group select:focus,
.modal .form-group textarea:focus{border-color:var(--cyan);}
.modal .form-group select option{background:var(--bg3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── NOTIFICATION DROPDOWN ── */
.notif-dropdown{
  position:fixed;top:calc(var(--header-h) + 8px);right:20px;
  width:340px;background:var(--card);
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
  z-index:200;display:none;overflow:hidden;
}
.notif-dropdown.open{display:block;animation:fadeUp 0.2s ease;}
.notif-head{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.notif-head h4{font-size:0.85rem;font-weight:700;color:var(--text);}
.notif-head button{background:none;border:none;color:var(--cyan);font-size:0.75rem;cursor:pointer;}
.notif-item{
  padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer;transition:background 0.15s;
}
.notif-item:hover{background:rgba(255,255,255,0.03);}
.notif-item .nmsg{font-size:0.83rem;color:var(--muted2);line-height:1.5;margin-bottom:3px;}
.notif-item .ntime{font-size:0.72rem;color:var(--muted);}
.notif-item.unread{background:rgba(0,212,255,0.04);}
.notif-item.unread .nmsg{color:var(--text);}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .header{left:0;}
  .main{margin-left:0;}
  .mobile-toggle{display:flex;}
  .profile-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .main{padding:16px;}
  .form-row{grid-template-columns:1fr;}
  .header{padding:0 16px;}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  padding:12px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;
  display:flex;align-items:center;gap:10px;
  transform:translateX(150%);transition:transform 0.3s ease;
  max-width:360px;
}
.toast.show{transform:translateX(0);}
.toast.success{background:#022c22;border:1px solid rgba(16,185,129,0.3);color:#10b981;}
.toast.error{background:#2d1515;border:1px solid rgba(239,68,68,0.3);color:#f87171;}

function bootstrapApp() {
  const r = ROLES[currentRole];
  const abbr = r.abbr;

  document.getElementById('sidebarName').textContent = r.name;
  document.getElementById('sidebarRole').textContent = r.title;
  document.getElementById('sidebarAvatar').textContent = abbr;
  document.getElementById('headerAvatar').textContent = abbr;
  document.getElementById('headerRoleBadge').textContent = currentRole.toUpperCase();

  buildSidebar();
  buildNotifications();
  navigateTo('dashboard');
}

/* ═══════════════════════════════════════════
   SIDEBAR BUILDER
═══════════════════════════════════════════ */
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const allowed = ACCESS[currentRole] || [];
  let currentGroup = '';
  nav.innerHTML = '';

  SECTIONS.forEach(sec => {
    if (sec.group !== currentGroup) {
      currentGroup = sec.group;
      const lbl = document.createElement('div');
      lbl.className = 'nav-section-label';
      lbl.textContent = currentGroup;
      nav.appendChild(lbl);
    }

    const hasAccess = allowed.includes(sec.id);
    const el = document.createElement('div');
    el.className = 'nav-item' + (hasAccess ? '' : ' locked');
    el.innerHTML = `
      <i class="icon ${sec.icon}"></i>
      <span class="label">${sec.label}</span>
      ${!hasAccess ? '<i class="fas fa-lock lock-icon"></i>' : ''}
    `;
    if (hasAccess) {
      el.onclick = () => navigateTo(sec.id);
    } else {
      el.title = 'Access restricted — requires higher clearance';
    }
    el.dataset.section = sec.id;
    nav.appendChild(el);
  });
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function navigateTo(sectionId) {
  const allowed = ACCESS[currentRole] || [];
  currentSection = sectionId;

  // Update sidebar active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === sectionId);
  });

  // Update header
  const sec = SECTIONS.find(s => s.id === sectionId);
  document.getElementById('headerTitle').textContent = sec ? sec.label : 'Dashboard';
  document.getElementById('headerBreadcrumb').textContent = `FSM Portal / ${sec ? sec.group : ''} / ${sec ? sec.label : ''}`;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  // Render section
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  if (!allowed.includes(sectionId)) {
    renderLockedSection(main, sec);
    return;
  }

  renderSection(main, sectionId);
}

function renderLockedSection(container, sec) {
  const needed = Object.entries(ACCESS)
    .filter(([r,arr]) => arr.includes(sec ? sec.id : ''))
    .map(([r]) => ROLES[r]?.title || r)
    .slice(0,3).join(', ');

  container.innerHTML = `
    <div class="section-header">
      <h2>${sec ? sec.label : 'Restricted'}</h2>
      <p>This section requires elevated access clearance</p>
    </div>
    <div class="section-locked">

function quickLeaveAction(id, action) {
  const leave = leaveData.find(l=>l.id===id);
  if (!leave) return;
  leave.status = action==='approve' ? 'approved' : 'rejected';
  showToast(`${leave.name}'s leave ${leave.status}`, action==='approve'?'success':'error');
  renderLeaves(document.getElementById('mainContent'));
}

function openLeaveModal(id) {
  currentLeaveId = id;
  const l = leaveData.find(l=>l.id===id);
  if (!l) return;
  document.getElementById('leaveModalContent').innerHTML = `
    <div style="display:grid;gap:12px;">
      <div class="info-row" style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:16px;"><label style="color:var(--muted);font-size:0.78rem;font-weight:700;width:120px;">Employee</label><span style="color:var(--text);font-weight:600;">${l.name}</span></div>

      <div class="info-row" style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:16px;"><label style="color:var(--muted);font-size:0.78rem;font-weight:700;width:120px;">Duration</label><span style="color:var(--text);">${l.start} to ${l.end} (${l.days} days)</span></div>
      <div class="info-row" style="padding:10px 0;display:flex;gap:16px;"><label style="color:var(--muted);font-size:0.78rem;font-weight:700;width:120px;">Reason</label><span style="color:var(--text);">${l.reason}</span></div>

function leaveAction(action) {
  if (!currentLeaveId) return;
  quickLeaveAction(currentLeaveId, action);

        {icon:'🛡️',name:'Security Incident Report',date:'Mar 28, 2026',type:'PDF'},
        {icon:'📅',name:'Attendance Summary — Q1',date:'Mar 31, 2026',type:'PDF'},
        {icon:'📈',name:'Sales Pipeline Q1',date:'Mar 25, 2026',type:'Excel'},
        {icon:'⚖️',name:'Compliance Audit Report',date:'Mar 20, 2026',type:'PDF'},
      ].map(r=>`<div class="dept-card" style="cursor:pointer;" onclick="showToast('Downloading ${r.name}...','info')">
        <div class="dept-icon">${r.icon}</div>
        <h4>${r.name}</h4>
        <p style="margin-bottom:10px;font-size:0.78rem;color:var(--muted);">${r.date}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="badge badge-info">${r.type}</span>
          <i class="fas fa-download" style="color:var(--muted);font-size:0.85rem;"></i>
        </div>
      </div>`).join('')}
    </div>`;
}

/* ── SETTINGS ── */
function renderSettings(c) {
  c.innerHTML = `
    <div class="section-header"><h2>Settings</h2><p>Dashboard preferences and configuration</p></div>
    <div class="info-card" style="max-width:600px;">
      <h3>Notification Preferences</h3>
      ${[
        'Leave request notifications',
        'Performance review reminders',
        'Security incident alerts',
        'System maintenance alerts',
        'New team member onboarding',
      ].map((s,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:0.875rem;color:var(--muted2);">${s}</span>
        <div style="width:44px;height:24px;background:${i<3?'var(--cyan)':'var(--bg3)'};border-radius:12px;cursor:pointer;position:relative;border:1px solid ${i<3?'var(--cyan)':'var(--border)'};" onclick="this.style.background=this.style.background.includes('cyan')?'var(--bg3)':'var(--cyan)';this.style.borderColor=this.style.borderColor.includes('cyan')?'var(--border)':'var(--cyan)';this.children[0].style.left=this.children[0].style.left==='2px'?'22px':'2px';showToast('Preference updated','success')">
          <div style="position:absolute;top:2px;left:${i<3?'22px':'2px'};width:18px;height:18px;background:#fff;border-radius:50%;transition:left 0.2s;"></div>
        </div>
      </div>`).join('')}
    </div>`;
}

/* ═══════════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════════ */
function buildNotifications() {
  const unread = notifData.filter(n=>!n.read).length;
  document.getElementById('notifDot').style.display = unread>0 ? 'block':'none';
  const list = document.getElementById('notifList');
  list.innerHTML = notifData.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="markRead(${n.id})">
      <div class="nmsg">${n.msg}</div>
      <div class="ntime">${n.time}</div>
    </div>`).join('');
}

function toggleNotif() {
  document.getElementById('notifDropdown').classList.toggle('open');
}

function markRead(id) {
  const n = notifData.find(n=>n.id===id);
  if (n) { n.read=true; buildNotifications(); }
}

function markAllRead() {
  notifData.forEach(n=>n.read=true);
  buildNotifications();
  showToast('All notifications marked as read','success');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#notifDropdown') && !e.target.closest('#notifBtn')) {
    document.getElementById('notifDropdown').classList.remove('open');
  }
});

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); });
});

function submitAddMember() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { showToast('Name is required','error'); return; }
  const newMember = {
    id: teamData.length+1,
    eid:'EMP-00'+(teamData.length+1),
    name, pos: document.getElementById('mPos').value || 'Staff',
    dept: document.getElementById('mDept').value || 'General',
    email: document.getElementById('mEmail').value || `${name.split(' ')[0].toLowerCase()}@fsm.co.tz`,
    status:'Active', perf: 80
  };
  teamData.push(newMember);
  closeModal('addMemberModal');
  showToast(`${name} added to team successfully`,'success');
  document.getElementById('addMemberModal').querySelector('form') && document.getElementById('addMemberModal').querySelector('form').reset();
  ['mName','mId','mPos','mEmail'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  if (currentSection === 'team') renderTeam(document.getElementById('mainContent'));
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  const icons = {success:'<i class="fas fa-check-circle"></i>',error:'<i class="fas fa-times-circle"></i>',info:'<i class="fas fa-info-circle"></i>'};
  t.className = `toast ${type}`;
  t.innerHTML = (icons[type]||'') + ' ' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),3200);
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUT
═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));
    document.getElementById('notifDropdown').classList.remove('open');
  }
});
</script>
